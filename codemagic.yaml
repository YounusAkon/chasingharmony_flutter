workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.stelys.chasingharmonyFluttere
      vars:
        XCODE_SCHEME: Runner
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(...)       # replace with your encrypted value
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(...)  # replace with your encrypted value
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(...)     # replace with your encrypted value
        CERTIFICATE_PRIVATE_KEY: Encrypted(...)           # replace with your encrypted value
    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          find . -name "Podfile" -execdir pod install \;
        working_directory: ios
      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
